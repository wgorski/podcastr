name: podcastr
description: Podcastr — Aurora-themed audio library (Flutter port of the design prototype).
publish_to: "none"
version: 0.9.4

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  # Persist the library across restarts
  shared_preferences: ^2.5.2
  # Receive YouTube URLs shared from other apps
  receive_sharing_intent: ^1.8.1
  # Filesystem paths for downloaded audio
  path_provider: ^2.1.5
  # Runtime POST_NOTIFICATIONS permission on Android 13+ (so the WorkManager
  # download foreground service can post its progress notification)
  permission_handler: ^11.3.1
  # Actual audio playback
  just_audio: ^0.9.42
  # Media-session notification + lock-screen controls (Spotify-style)
  just_audio_background: ^0.0.1-beta.13
  # Native share sheet (Share the original YouTube URL out of the app)
  share_plus: ^10.1.4
  # HTTP client for hitting the Jina Reader API and the ElevenLabs TTS API
  http: ^1.2.2
  # Headless WebView used as a fallback when Jina Reader is unreachable — we
  # load the article in a hidden browser and run Mozilla Readability.js
  # against the live DOM. flutter_inappwebview is the cleanest path because
  # HeadlessInAppWebView doesn't need a widget-tree attachment. Pinned to
  # the 6.2.0 beta because the 6.1.x line references the legacy
  # `proguard-android.txt` default which AGP 9 removed.
  flutter_inappwebview: ^6.2.0-beta.3

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/readability.js
